<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="花醫班表">
<title>花醫班表系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #1a2744;
  --navy-light: #243159;
  --blue: #2d5be3;
  --blue-light: #4a72f0;
  --teal: #0ea5a0;
  --teal-light: #12c4be;
  --gold: #f5a623;
  --red: #e84040;
  --green: #22c55e;
  --bg: #f0f4ff;
  --surface: #ffffff;
  --border: #dde4f5;
  --text: #1a2744;
  --text-muted: #6b7a9e;
  --shift-day: #e8f0ff;
  --shift-day-text: #1e40af;
  --shift-eve: #fff3e0;
  --shift-eve-text: #c45c00;
  --shift-night: #1a2744;
  --shift-night-text: #93c5fd;
  --shift-off: #f3f4f6;
  --shift-off-text: #6b7280;
  --shadow: 0 2px 12px rgba(26,39,68,0.10);
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
#header{
  background:var(--navy);
  color:#fff;
  padding:12px 20px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(26,39,68,0.25);
}
#header h1{font-size:1.1rem;font-weight:700;letter-spacing:0.04em;flex:1;}
#header h1 span{color:var(--teal-light);font-size:0.7rem;margin-left:6px;font-weight:400;}
.nav-btn{
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.82rem;
  transition:all .15s;font-family:inherit;
}
.nav-btn:hover{background:rgba(255,255,255,0.22);}
.nav-btn.active{background:var(--blue);border-color:var(--blue);}
#monthNav{display:flex;align-items:center;gap:6px;}
#monthNav button{
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
#monthNav button:hover{background:rgba(255,255,255,0.25);}
#monthLabel{font-size:0.92rem;font-weight:600;min-width:80px;text-align:center;}

/* ── MAIN ── */
#main{padding:16px;max-width:1400px;margin:0 auto;}

/* ── EMPTY STATE ── */
#emptyState{
  text-align:center;padding:80px 20px;
}
#emptyState .icon{font-size:4rem;margin-bottom:16px;}
#emptyState h2{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:8px;}
#emptyState p{color:var(--text-muted);font-size:0.9rem;max-width:400px;margin:0 auto 24px;}
.upload-zone{
  border:2px dashed var(--blue);border-radius:var(--radius);
  padding:32px;cursor:pointer;
  background:white;max-width:480px;margin:0 auto;
  transition:all .2s;
}
.upload-zone:hover{background:var(--shift-day);border-color:var(--blue-light);}
.upload-zone input{display:none;}
.upload-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--blue);color:#fff;padding:10px 22px;
  border-radius:8px;cursor:pointer;font-size:0.92rem;font-weight:600;
  border:none;font-family:inherit;margin-top:12px;transition:all .15s;
}
.upload-btn:hover{background:var(--blue-light);}

/* ── TOOLBAR ── */
#toolbar{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.tool-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;
  font-size:0.83rem;font-weight:500;transition:all .15s;font-family:inherit;
}
.tool-btn:hover{background:var(--shift-day);border-color:var(--blue);}
.tool-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.tool-btn.primary:hover{background:var(--blue-light);}
#searchBox{
  padding:7px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:0.83rem;width:140px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
#searchBox:focus{border-color:var(--blue);}
.spacer{flex:1;}

/* ── MONTH NOTE ── */
#noteBar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  color:#dde8ff;border-radius:var(--radius);padding:10px 16px;
  margin-bottom:14px;font-size:0.82rem;line-height:1.5;
  display:none;
}
#noteBar strong{color:var(--teal-light);}

/* ── LEGEND ── */
#legend{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;
}
.leg{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--text-muted);}
.leg-dot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}

/* ── TABLE ── */
#scheduleWrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);}
#scheduleTable{
  border-collapse:collapse;width:100%;background:var(--surface);
  font-size:0.78rem;min-width:900px;
}
#scheduleTable th{
  background:var(--navy);color:#dde8ff;
  padding:6px 4px;text-align:center;font-weight:600;
  border-right:1px solid rgba(255,255,255,0.08);
  position:sticky;top:0;z-index:10;white-space:nowrap;
}
#scheduleTable th.date-th{font-size:0.72rem;min-width:32px;}
#scheduleTable th.weekend{background:#152038;color:#f59e0b;}
#scheduleTable th.holiday-mark{background:#2a1010;color:#f87171;}
#scheduleTable td{
  padding:4px 2px;text-align:center;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
#scheduleTable tr:last-child td{border-bottom:none;}
.emp-name-td{
  padding:4px 10px;font-weight:700;font-size:0.82rem;
  background:#fafbff;text-align:left;
  border-right:2px solid var(--border)!important;
  position:sticky;left:0;z-index:5;
  min-width:80px;max-width:100px;
}
.emp-order-td{
  color:var(--text-muted);font-size:0.72rem;padding:4px 6px;
  background:#fafbff;position:sticky;left:0;
  border-right:1px solid var(--border)!important;
  width:28px;
}
.emp-type-td{
  font-size:0.7rem;color:var(--text-muted);padding:4px 6px;
  background:#fafbff;
  border-right:2px solid var(--border)!important;
  position:sticky;left:0;
  max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
tr:hover td{background:#f5f8ff!important;}
tr:hover .emp-name-td, tr:hover .emp-order-td, tr:hover .emp-type-td{background:#eef2ff!important;}

/* ── SHIFT CELLS ── */
.shift{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:5px;
  font-size:0.75rem;font-weight:700;cursor:pointer;
  transition:transform .1s;user-select:none;
}
.shift:hover{transform:scale(1.15);}
.shift-日{background:var(--shift-day);color:var(--shift-day-text);}
.shift-小{background:var(--shift-eve);color:var(--shift-eve-text);}
.shift-大{background:var(--shift-night);color:var(--shift-night-text);}
.shift-休{background:var(--shift-off);color:var(--shift-off-text);}
.shift-empty{background:transparent;color:var(--text-muted);font-size:0.6rem;}
.shift-上{background:#dff0ea;color:#15803d;font-size:0.65rem;}
.shift-下{background:#fce7e7;color:#b91c1c;font-size:0.65rem;}
.today-col td{background:#fffbeb!important;}
.today-col .emp-name-td,.today-col .emp-order-td,.today-col .emp-type-td{background:#fef9e7!important;}

/* ── WEEKEND / HOLIDAY COLS ── */
.weekend-col td{background:#f9fafe!important;}
.weekend-col .shift-日{opacity:0.75;}

/* ── STATS ROW ── */
.stats-row td{
  padding:3px 2px;font-size:0.68rem;color:var(--text-muted);
  border-top:2px solid var(--border)!important;
  background:#f8f9ff!important;
}
.stat-badge{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-size:0.65rem;font-weight:600;
}
.stat-日{background:var(--shift-day);color:var(--shift-day-text);}
.stat-小{background:var(--shift-eve);color:var(--shift-eve-text);}
.stat-大{background:var(--shift-night);color:var(--shift-night-text);}
.stat-休{background:var(--shift-off);color:var(--shift-off-text);}

/* ── EDIT MODAL ── */
#modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:999;align-items:center;justify-content:center;
}
#modal.show{display:flex;}
#modalBox{
  background:var(--surface);border-radius:14px;padding:24px;
  min-width:280px;box-shadow:0 8px 40px rgba(0,0,0,0.2);
}
#modalBox h3{font-size:1rem;margin-bottom:4px;}
#modalBox .sub{color:var(--text-muted);font-size:0.8rem;margin-bottom:16px;}
.shift-picker{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.shift-opt{
  width:52px;height:52px;border-radius:10px;border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .15s;
}
.shift-opt.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,0.3);}
.shift-opt:hover{transform:scale(1.08);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{
  padding:8px 18px;border-radius:8px;border:none;cursor:pointer;
  font-size:0.85rem;font-weight:600;font-family:inherit;transition:all .15s;
}
.modal-btn.cancel{background:var(--border);color:var(--text);}
.modal-btn.cancel:hover{background:#d0d9f0;}
.modal-btn.save{background:var(--blue);color:#fff;}
.modal-btn.save:hover{background:var(--blue-light);}

/* ── ORDER SECTION ── */
#orderSection{
  margin-top:16px;background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px 20px;display:none;
}
#orderSection h3{font-size:0.88rem;font-weight:700;color:var(--navy);margin-bottom:10px;}
.order-row{display:flex;gap:24px;flex-wrap:wrap;}
.order-group{flex:1;min-width:200px;}
.order-group h4{font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.order-list{display:flex;gap:6px;flex-wrap:wrap;}
.order-badge{
  background:var(--navy);color:#dde8ff;
  padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;
}
.order-badge:first-child{background:var(--gold);color:var(--navy);}
.order-badge:nth-child(2){background:var(--blue);color:#fff;}

/* ── MULTI-SHEET PICKER ── */
#sheetPicker{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:999;align-items:center;justify-content:center;
}
#sheetPicker.show{display:flex;}
#sheetPickerBox{
  background:var(--surface);border-radius:14px;padding:24px;
  min-width:320px;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,0.2);
}
#sheetPickerBox h3{font-size:1rem;margin-bottom:4px;}
#sheetPickerBox .sub{color:var(--text-muted);font-size:0.8rem;margin-bottom:16px;}
.sheet-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.sheet-item{
  padding:10px 14px;border:1px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:0.85rem;transition:all .15s;
  display:flex;align-items:center;gap:8px;
}
.sheet-item:hover{background:var(--shift-day);border-color:var(--blue);}
.sheet-item .sheet-icon{color:var(--blue);}
#sheetPickerActions{display:flex;justify-content:flex-end;margin-top:16px;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;
  font-size:0.85rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1;}

/* ── PRINT ── */
@media print {
  #header, #toolbar, #orderSection, #modal, #toast{display:none!important;}
  #scheduleWrap{box-shadow:none;overflow:visible;}
  #scheduleTable{font-size:0.65rem;}
  .shift{width:20px;height:20px;font-size:0.6rem;}
}

@media (max-width: 600px) {
  #header{padding:10px 12px;}
  #main{padding:10px;}
  #legend{gap:6px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div style="font-size:1.5rem;">🏥</div>
  <h1>花醫班表系統 <span>v2.0</span></h1>
  <div id="monthNav" style="display:none;">
    <button id="prevMonth" onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button id="nextMonth" onclick="changeMonth(1)">›</button>
  </div>
  <button class="nav-btn" id="importBtn" onclick="document.getElementById('fileInput').click()">📂 匯入 Excel</button>
  <button class="nav-btn" id="printBtn" onclick="window.print()" style="display:none;">🖨️ 列印</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this)">
</div>

<!-- MAIN -->
<div id="main">

  <!-- Empty state -->
  <div id="emptyState">
    <div class="icon">📅</div>
    <h2>花醫檢驗科班表系統</h2>
    <p>請匯入 Excel 班表檔案（.xlsx）<br>系統會自動解析所有工作表</p>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:2rem;margin-bottom:8px;">📊</div>
      <div style="font-weight:600;color:var(--navy);margin-bottom:4px;">點擊或拖曳 Excel 檔案到這裡</div>
      <div style="font-size:0.8rem;color:var(--text-muted);">支援花醫標準班表格式（.xlsx）</div>
      <button class="upload-btn">選擇檔案</button>
    </div>
  </div>

  <!-- Toolbar (hidden until data loaded) -->
  <div id="toolbar" style="display:none;">
    <input type="text" id="searchBox" placeholder="🔍 搜尋人員" oninput="filterTable()">
    <button class="tool-btn" onclick="showAllEmps()">全部人員</button>
    <button class="tool-btn" onclick="filterByType('夜班')">🌙 夜班</button>
    <button class="tool-btn" onclick="filterByType('正常班')">☀️ 正常班</button>
    <div class="spacer"></div>
    <button class="tool-btn" onclick="toggleStats()">📊 統計</button>
    <button class="tool-btn primary" onclick="document.getElementById('fileInput').click()">📂 換匯入</button>
  </div>

  <!-- Note bar -->
  <div id="noteBar"></div>

  <!-- Legend -->
  <div id="legend" style="display:none;">
    <div class="leg"><div class="leg-dot shift-日">日</div><span>日班 07~15</span></div>
    <div class="leg"><div class="leg-dot shift-小">小</div><span>小夜 15~23</span></div>
    <div class="leg"><div class="leg-dot shift-大">大</div><span>大夜 23~07</span></div>
    <div class="leg"><div class="leg-dot shift-休">休</div><span>休假</span></div>
    <div class="leg"><div class="leg-dot shift-上">上</div><span>上午休</span></div>
    <div class="leg"><div class="leg-dot shift-下">下</div><span>下午休</span></div>
  </div>

  <!-- Schedule table -->
  <div id="scheduleWrap" style="display:none;">
    <table id="scheduleTable"></table>
  </div>

  <!-- Order section -->
  <div id="orderSection"></div>

</div>

<!-- Sheet Picker Modal -->
<div id="sheetPicker">
  <div id="sheetPickerBox">
    <h3>📋 選擇要顯示的工作表</h3>
    <p class="sub">檔案中有多個班表，請選擇要載入的月份</p>
    <div class="sheet-list" id="sheetList"></div>
    <div id="sheetPickerActions">
      <button class="modal-btn cancel" onclick="closeSheetPicker()">取消</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle">修改班別</h3>
    <div class="sub" id="modalSub"></div>
    <div class="shift-picker" id="shiftPicker"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn save" onclick="saveShift()">儲存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── STATE ──
const SHIFTS = ['日','小','大','休','上','下'];
const SHIFT_LABELS = {'日':'日班','小':'小夜','大':'大夜','休':'休假','上':'上午休','下':'下午休'};
let allSheets = {}; // { sheetName: parsedData }
let currentSheetName = '';
let currentData = null; // { monthLabel, dates, employees, overtimeOrder, leaveOrder, note }
let showStats = false;
let activeFilter = '';
let pendingEdit = null; // { empIdx, dateIdx, oldShift }
let workbook = null;

// ── FILE HANDLING ──
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const validSheets = workbook.SheetNames.filter(n => n !== '資料' && n !== '工作表1');
      if (validSheets.length === 0) { showToast('❌ 找不到有效班表工作表'); return; }

      // Pre-check each sheet so we can give a helpful message if all fail.
      const results = validSheets.map(name => ({ name, data: parseSheet(name) }));
      const okSheets = results.filter(r => r.data).map(r => r.name);
      allSheets = {};
      results.forEach(r => { if (r.data) allSheets[r.name] = r.data; });

      if (okSheets.length === 0) {
        showToast('❌ 所有工作表都無法解析，請查看下方說明');
        showParseFailureHelp(validSheets);
        return;
      }
      if (okSheets.length < validSheets.length) {
        const failed = validSheets.filter(n => !okSheets.includes(n));
        showToast(`⚠️ ${okSheets.length}/${validSheets.length} 個月份解析成功（"${failed.join('、')}" 解析失敗，可能是公式快取問題）`);
      }
      if (okSheets.length === 1) {
        loadSheet(okSheets[0]);
      } else {
        openSheetPicker(okSheets);
      }
    } catch(err) {
      showToast('❌ 讀取失敗：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function showParseFailureHelp(sheetNames) {
  const wrap = document.getElementById('emptyState');
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div class="icon">⚠️</div>
    <h2>無法解析這個檔案</h2>
    <p style="text-align:left;max-width:520px;line-height:1.7;">
      已嘗試解析工作表：<strong>${sheetNames.join('、')}</strong>，但都找不到有效的日期/姓名資料。<br><br>
      最常見的原因：此工作表的儲存格內容是 <strong>公式</strong>（例如 VLOOKUP / IF 從「資料」工作表取值），
      而瀏覽器只能讀取 Excel 上次存檔時「計算後的快取值」。如果存檔時快取沒有更新（或快取是 #VALUE!/#REF! 錯誤），
      匯入就會失敗。<br><br>
      <strong>解法：</strong>請用 Microsoft Excel 開啟此檔案 → 按一下 <code>Ctrl+Alt+F9</code>（強制重新計算全部公式）
      → 存檔 → 再重新匯入一次。或者，將該工作表「複製後以值貼上」成另一個不含公式的工作表再匯入。
    </p>
    <button class="upload-btn" style="margin-top:8px;" onclick="document.getElementById('fileInput').click()">重新選擇檔案</button>
  `;
}

function openSheetPicker(sheets) {
  const list = document.getElementById('sheetList');
  list.innerHTML = '';
  sheets.forEach(name => {
    const el = document.createElement('div');
    el.className = 'sheet-item';
    el.innerHTML = `<span class="sheet-icon">📅</span>${name}`;
    el.onclick = () => { closeSheetPicker(); loadSheet(name); };
    list.appendChild(el);
  });
  document.getElementById('sheetPicker').classList.add('show');
}
function closeSheetPicker() {
  document.getElementById('sheetPicker').classList.remove('show');
}

function loadSheet(sheetName) {
  currentSheetName = sheetName;
  currentData = allSheets[sheetName] || parseSheet(sheetName);
  if (!currentData) { showToast('❌ 無法解析此工作表'); return; }
  allSheets[sheetName] = currentData;
  renderSchedule();
}

// ── PARSE SHEET ──
function parseSheet(sheetName) {
  const ws = workbook.Sheets[sheetName];
  if (!ws) return null;
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

  // Find header row (has '院區' in col 0 and '姓名' in col 2).
  // Some sheets (e.g. formula-driven '班表') may still have these as literal
  // text even though the data cells below are VLOOKUP/IF formulas.
  let headerRowIdx = -1;
  for (let i = 0; i < raw.length; i++) {
    const row = raw[i];
    if (!row) continue;
    if (row[0] === '院區' && (row[2] === '姓名' || row[1] === '工作')) { headerRowIdx = i; break; }
  }
  if (headerRowIdx < 0) {
    console.warn(`[parseSheet] '${sheetName}': 找不到標頭列 (院區/姓名)`);
    return null;
  }

  const dateRow = raw[headerRowIdx];      // dates in cols 4+
  const weekRow = raw[headerRowIdx + 1];  // weekdays

  // Parse dates (cols 4..34). Be defensive: formula-driven sheets may return
  // cached values as Date objects, date-like strings, Excel serial numbers,
  // or (if the cache is stale/broken) error strings like '#VALUE!' / '#REF!'.
  const dates = [];
  let formulaIssue = false;
  for (let c = 4; c < dateRow.length - 1; c++) {
    const v = dateRow[c];
    if (v === null || v === undefined || v === '') break;
    let dateStr = null;
    if (v instanceof Date) {
      dateStr = fmtDate(v);
    } else if (typeof v === 'string') {
      if (v.match(/^\d{4}-\d{2}-\d{2}/)) {
        dateStr = v.slice(0, 10);
      } else if (v.startsWith('#')) {
        // Stale/broken formula cache (e.g. #VALUE!, #REF!) - stop here,
        // flag it so the user gets a helpful message instead of silent failure.
        formulaIssue = true;
        break;
      } else if (!isNaN(Date.parse(v))) {
        dateStr = fmtDate(new Date(v));
      }
    } else if (typeof v === 'number' && v > 25000 && v < 60000) {
      // Excel serial date number fallback
      const d = new Date(Math.round((v - 25569) * 86400 * 1000));
      dateStr = fmtDate(d);
    }
    if (!dateStr) break;
    const week = weekRow ? (weekRow[c] || '') : '';
    const weekStr = String(week).trim();
    const isWeekend = weekStr.startsWith('六') || weekStr.startsWith('日');
    dates.push({ dateStr, day: parseInt(dateStr.slice(8)), weekday: weekStr, isWeekend });
  }
  if (dates.length === 0) {
    if (formulaIssue) {
      console.warn(`[parseSheet] '${sheetName}': 日期欄位是公式且快取值無效 (#VALUE!/#REF!)，請在 Excel 中開啟並重新存檔讓公式重新計算後再匯入`);
    } else {
      console.warn(`[parseSheet] '${sheetName}': 找不到任何日期欄`);
    }
    return null;
  }

  // Month label (row 3, col 0)
  let monthLabel = sheetName;
  for (let i = 0; i < 6; i++) {
    const r = raw[i];
    if (r && r[0] && typeof r[0] === 'string' && r[0].match(/[一二三四五六七八九十]{1,2}月/)) {
      monthLabel = r[0].replace(/\s.*/,'');
      break;
    }
  }

  // Note (row 3, col 3 or large text)
  let note = '';
  for (let i = 0; i < 6; i++) {
    const r = raw[i];
    if (r) {
      for (let c = 1; c < r.length; c++) {
        const v = r[c];
        if (typeof v === 'string' && v.length > 50) { note = v; break; }
      }
    }
    if (note) break;
  }

  // Parse employees (every 2 rows starting from headerRowIdx+2)
  const employees = [];
  for (let ri = headerRowIdx + 2; ri < raw.length; ri += 2) {
    const row = raw[ri];
    if (!row) continue;
    const order = row[1];
    let name = row[2];
    const type = row[3];
    if (name && typeof name === 'string' && name.startsWith('#')) name = null; // stale formula cache
    if (!name || typeof name !== 'string' || !name.trim()) continue;
    if (!order && !type) continue;
    // Stop once we hit summary rows (order/overtime/leave sections use text labels, not numbers)
    if (typeof order === 'string' && (order.includes('順序') || order.includes('日期') || order.includes('天數'))) break;
    // Shifts in cols 4..4+dates.length-1
    const shifts = [];
    for (let ci = 0; ci < dates.length; ci++) {
      let v = row[4 + ci];
      if (v === null || v === undefined || v === '') shifts.push('');
      else {
        const s = String(v).trim();
        shifts.push(s.startsWith('#') ? '' : s); // skip stale formula errors
      }
    }
    employees.push({
      order: order ? parseInt(order) || 99 : 99,
      name: name.trim(),
      type: type ? String(type).trim() : '',
      site: row[0] ? String(row[0]).trim() : '',
      shifts
    });
  }

  // Parse overtime & leave order (rows below employees).
  // Layout varies: label cell can be in different columns, and names may not
  // start immediately in the next column (nulls in between), e.g.:
  //   row35: [...,'緊急加班順序：', null, null, '1.慧敏', '2逸薇', ...]
  //   row39: [...,'填假順序', null, '長親', '雅順', ...]
  let overtimeOrder = [], leaveOrder = [];
  const ORDER_STOPWORDS = new Set(['備註','說明','注意','合計','總計','日期','順序','姓名']);
  const collectNames = (row, startCol) => {
    const names = [];
    for (let cc = startCol; cc < Math.min(startCol + 20, row.length); cc++) {
      const vv = row[cc];
      if (vv === null || vv === undefined || vv === '') continue;
      let s = String(vv).trim();
      if (!s || s.startsWith('#')) continue;
      // Strip leading numbering like "1.", "2", "3、" etc.
      s = s.replace(/^\d+[\.\、\s]*/, '').trim();
      // Skip anything that's clearly not a short name (long notes/paragraphs/labels)
      if (!s || s.length > 6 || s.includes('\n') || ORDER_STOPWORDS.has(s)) continue;
      names.push(s);
    }
    return names;
  };
  for (let ri = headerRowIdx; ri < raw.length; ri++) {
    const row = raw[ri];
    if (!row) continue;
    for (let c = 0; c < row.length; c++) {
      const v = row[c];
      if (typeof v !== 'string') continue;
      if (v.includes('緊急加班順序') && overtimeOrder.length === 0) {
        overtimeOrder = collectNames(row, c + 1);
      }
      if (v.includes('填假順序') && leaveOrder.length === 0) {
        leaveOrder = collectNames(row, c + 1);
      }
    }
  }

  return { monthLabel, dates, employees, overtimeOrder, leaveOrder, note };
}

function fmtDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

// ── RENDER ──
function renderSchedule() {
  const data = currentData;
  if (!data || !data.employees.length) { showToast('❌ 此工作表沒有班表資料'); return; }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('scheduleWrap').style.display = 'block';
  document.getElementById('printBtn').style.display = '';
  document.getElementById('monthNav').style.display = 'flex';

  // Month label
  document.getElementById('monthLabel').textContent = data.monthLabel;

  // Note
  const noteBar = document.getElementById('noteBar');
  if (data.note) {
    noteBar.style.display = 'block';
    noteBar.innerHTML = `<strong>📌 ${data.monthLabel} 備註：</strong>${data.note.split('\\n').join('<br>')}`;
  } else {
    noteBar.style.display = 'none';
  }

  const today = new Date(); const todayStr = fmtDate(today);

  const emps = getFilteredEmps();
  const tbl = document.getElementById('scheduleTable');
  tbl.innerHTML = '';

  // ── HEADER ROWS ──
  const thead = document.createElement('thead');
  // Row 1: labels + dates
  const hr1 = document.createElement('tr');
  ['順','姓名','班別'].forEach((t,i) => {
    const th = document.createElement('th');
    th.textContent = t;
    th.style.width = i === 0 ? '28px' : i === 1 ? '80px' : '56px';
    hr1.appendChild(th);
  });
  data.dates.forEach(d => {
    const th = document.createElement('th');
    th.className = 'date-th' + (d.isWeekend ? ' weekend' : '');
    th.textContent = d.day;
    if (d.dateStr === todayStr) {
      th.style.background = '#c57a00';
      th.style.color = '#fff';
    }
    hr1.appendChild(th);
  });
  if (showStats) {
    ['日','小','大','休'].forEach(s => {
      const th = document.createElement('th');
      th.textContent = s;
      th.style.width = '28px';
      hr1.appendChild(th);
    });
  }
  thead.appendChild(hr1);

  // Row 2: weekdays
  const hr2 = document.createElement('tr');
  ['','',''].forEach(() => { const th = document.createElement('th'); hr2.appendChild(th); });
  data.dates.forEach(d => {
    const th = document.createElement('th');
    th.className = 'date-th' + (d.isWeekend ? ' weekend' : '');
    th.style.fontSize = '0.62rem';
    th.textContent = d.weekday.slice(0,1) === '一'?'一':d.weekday.slice(0,1) === '二'?'二':d.weekday.slice(0,1) === '三'?'三':d.weekday.slice(0,1) === '四'?'四':d.weekday.slice(0,1) === '五'?'五':d.weekday.slice(0,1) === '六'?'六':d.weekday.slice(0,1) === '日'?'日':'';
    if (d.dateStr === todayStr) th.style.background = '#c57a00';
    hr2.appendChild(th);
  });
  if (showStats) {
    ['班','次','次','天'].forEach(s => {
      const th = document.createElement('th'); th.textContent=''; hr2.appendChild(th);
    });
  }
  thead.appendChild(hr2);
  tbl.appendChild(thead);

  // ── BODY ──
  const tbody = document.createElement('tbody');
  emps.forEach((emp, empIdx) => {
    const tr = document.createElement('tr');
    // Check if this row has today
    const hasTodayShift = data.dates.some(d => d.dateStr === todayStr);

    // Order cell
    const tdOrd = document.createElement('td');
    tdOrd.className = 'emp-order-td';
    tdOrd.textContent = emp.order < 99 ? emp.order : '';
    tr.appendChild(tdOrd);

    // Name cell
    const tdName = document.createElement('td');
    tdName.className = 'emp-name-td';
    tdName.textContent = emp.name;
    if (emp.site && emp.site !== '本院') {
      tdName.style.color = 'var(--teal)';
    }
    tr.appendChild(tdName);

    // Type cell
    const tdType = document.createElement('td');
    tdType.className = 'emp-type-td';
    tdType.textContent = emp.type;
    tr.appendChild(tdType);

    // Shift cells
    data.dates.forEach((d, di) => {
      const td = document.createElement('td');
      if (d.isWeekend) td.parentElement?.classList?.add?.('weekend-col');
      const shift = emp.shifts[di] || '';
      const span = document.createElement('span');
      const cls = SHIFTS.includes(shift) ? `shift shift-${shift}` : `shift shift-empty`;
      span.className = cls;
      span.textContent = shift || '·';
      span.title = `${emp.name} ${d.dateStr} (${d.weekday}) ${SHIFT_LABELS[shift]||shift||'—'}`;
      span.onclick = () => openEditModal(empIdx, di, shift, emp, d);
      td.appendChild(span);

      // Weekend col style
      if (d.isWeekend) td.style.background = '#f5f7ff';
      // Today col
      if (d.dateStr === todayStr) td.style.background = '#fffbeb';
      tr.appendChild(td);
    });

    // Stats
    if (showStats) {
      const counts = {日:0,小:0,大:0,休:0};
      emp.shifts.forEach(s => { if (counts[s]!==undefined) counts[s]++; });
      ['日','小','大','休'].forEach(s => {
        const td = document.createElement('td');
        if (counts[s] > 0) {
          const b = document.createElement('span');
          b.className = `stat-badge stat-${s}`;
          b.textContent = counts[s];
          td.appendChild(b);
        }
        tr.appendChild(td);
      });
    }
    tbody.appendChild(tr);
  });

  // ── PER-DAY STATS ROW ──
  if (showStats) {
    const sr = document.createElement('tr');
    sr.className = 'stats-row';
    ['班數','',''].forEach(t => {
      const td = document.createElement('td');
      td.textContent = t;
      td.style.fontWeight = '700';
      td.style.fontSize = '0.7rem';
      sr.appendChild(td);
    });
    data.dates.forEach((d, di) => {
      const td = document.createElement('td');
      const counts = {};
      emps.forEach(emp => {
        const s = emp.shifts[di];
        if (s) counts[s] = (counts[s]||0)+1;
      });
      const fragments = [];
      ['日','小','大'].forEach(s => { if(counts[s]) fragments.push(`<span class="stat-badge stat-${s}">${counts[s]}</span>`); });
      td.innerHTML = fragments.join('');
      sr.appendChild(td);
    });
    ['','','',''].forEach(() => { const td = document.createElement('td'); sr.appendChild(td); });
    tbody.appendChild(sr);
  }

  tbl.appendChild(tbody);

  // Order section
  renderOrderSection();
}

function getFilteredEmps() {
  if (!currentData) return [];
  let emps = [...currentData.employees];
  const q = document.getElementById('searchBox')?.value?.trim().toLowerCase() || '';
  if (q) emps = emps.filter(e => e.name.toLowerCase().includes(q) || e.type.toLowerCase().includes(q));
  if (activeFilter) emps = emps.filter(e => e.type.includes(activeFilter));
  return emps;
}

function renderOrderSection() {
  const sec = document.getElementById('orderSection');
  const data = currentData;
  if (!data || (!data.overtimeOrder.length && !data.leaveOrder.length)) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  sec.innerHTML = `
    <h3>📋 ${data.monthLabel} 排序</h3>
    <div class="order-row">
      ${data.overtimeOrder.length ? `
        <div class="order-group">
          <h4>緊急加班順序</h4>
          <div class="order-list">
            ${data.overtimeOrder.map((n,i) => `<span class="order-badge">${i+1}. ${n}</span>`).join('')}
          </div>
        </div>` : ''}
      ${data.leaveOrder.length ? `
        <div class="order-group">
          <h4>填假順序</h4>
          <div class="order-list">
            ${data.leaveOrder.map((n,i) => `<span class="order-badge">${i+1}. ${n}</span>`).join('')}
          </div>
        </div>` : ''}
    </div>
  `;
}

// ── NAVIGATION ──
function changeMonth(delta) {
  const okSheets = Object.keys(allSheets);
  if (!okSheets.length) return;
  const idx = okSheets.indexOf(currentSheetName);
  const next = idx + delta;
  if (next < 0 || next >= okSheets.length) { showToast('已到最前/最後一個月份'); return; }
  loadSheet(okSheets[next]);
}

// ── FILTERS ──
function filterTable() { renderSchedule(); }
function showAllEmps() { activeFilter = ''; renderSchedule(); }
function filterByType(t) { activeFilter = t; renderSchedule(); }
function toggleStats() { showStats = !showStats; renderSchedule(); }

// ── EDIT MODAL ──
function openEditModal(empIdx, dateIdx, currentShift, emp, d) {
  pendingEdit = { empIdx: currentData.employees.indexOf(emp), dateIdx, oldShift: currentShift };
  document.getElementById('modalTitle').textContent = `修改班別`;
  document.getElementById('modalSub').textContent = `${emp.name}  ·  ${d.dateStr} (${d.weekday})`;
  const picker = document.getElementById('shiftPicker');
  picker.innerHTML = '';
  SHIFTS.forEach(s => {
    const el = document.createElement('div');
    el.className = `shift-opt shift-${s}${s === currentShift ? ' selected' : ''}`;
    el.textContent = s;
    el.title = SHIFT_LABELS[s];
    el.onclick = () => {
      picker.querySelectorAll('.shift-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    };
    picker.appendChild(el);
  });
  // Add empty option
  const elEmpty = document.createElement('div');
  elEmpty.className = `shift-opt shift-empty${!currentShift ? ' selected' : ''}`;
  elEmpty.textContent = '—';
  elEmpty.title = '清除';
  elEmpty.onclick = () => {
    picker.querySelectorAll('.shift-opt').forEach(x => x.classList.remove('selected'));
    elEmpty.classList.add('selected');
  };
  picker.appendChild(elEmpty);

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  pendingEdit = null;
}

function saveShift() {
  if (!pendingEdit) return;
  const selected = document.querySelector('#shiftPicker .shift-opt.selected');
  const newShift = selected ? (selected.textContent === '—' ? '' : selected.textContent) : '';
  const emp = currentData.employees[pendingEdit.empIdx];
  if (emp) {
    emp.shifts[pendingEdit.dateIdx] = newShift;
    showToast(`✅ ${emp.name} 已更新為「${newShift || '—'}」`);
  }
  closeModal();
  renderSchedule();
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── DRAG & DROP on empty state ──
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && file.name.match(/\.xlsx?$/i)) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleFile(document.getElementById('fileInput'));
  }
});
</script>
