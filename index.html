<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>花醫班表系統</title>
<meta name="description" content="花蓮醫院檢驗科班表管理系統"/>
<meta name="theme-color" content="#0d7377"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="花醫班表"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#fff;--s2:#f7f5f1;--s3:#edeae4;
  --bd:#ddd9d0;--bd2:#c5c0b4;
  --tx:#1a1916;--tx2:#5a5750;--tx3:#9a9690;
  --teal:#0d7377;--teal-bg:#e0f4f4;--teal-bd:#7ecece;--teal-tx:#084f52;
  --amber:#b45309;--amber-bg:#fef3c7;--amber-bd:#fbbf24;--amber-tx:#78350f;
  --red:#b91c1c;--red-bg:#fee2e2;--red-bd:#fca5a5;--red-tx:#7f1d1d;
  --blue:#1d4ed8;--blue-bg:#dbeafe;--blue-bd:#93c5fd;--blue-tx:#1e3a8a;
  --purple:#6d28d9;--purple-bg:#ede9fe;--purple-bd:#c4b5fd;--purple-tx:#4c1d95;
  --green:#065f46;--green-bg:#d1fae5;--green-bd:#6ee7b7;--green-tx:#064e3b;
  --r:8px;--rl:14px;
}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:1140px;margin:0 auto;padding:24px 18px 60px}
.card{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:0.5px solid var(--bd);flex-wrap:wrap;gap:10px;background:var(--s2)}
.hdr-l{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;background:var(--teal-bg);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:0.5px solid var(--teal-bd)}
.app-title{font-size:17px;font-weight:600;color:var(--tx);letter-spacing:0.3px}
.app-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.hdr-r{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.btn{border:0.5px solid var(--bd2);background:transparent;color:var(--tx);padding:7px 13px;border-radius:var(--r);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:background 0.15s,transform 0.1s;line-height:1}
.btn:hover{background:var(--s3)}
.btn-teal{background:var(--teal-bg);color:var(--teal-tx);border-color:var(--teal-bd)}
.btn-amber{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd)}
.btn-blue{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-bd)}
.btn-green{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
.btn-red{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);padding:5px 10px;font-size:12px}
.tabs{display:flex;border-bottom:0.5px solid var(--bd);background:var(--s2);padding:0 22px;gap:0}
.tab{padding:10px 17px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--teal-tx);border-bottom-color:var(--teal)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 22px 9px;flex-wrap:wrap;gap:8px}
.nav-c{display:flex;align-items:center;gap:11px}
.nav-btn{border:0.5px solid var(--bd);background:var(--s2);color:var(--tx);width:32px;height:32px;border-radius:var(--r);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.nav-lbl{text-align:center;min-width:130px}
.nav-lbl .wr{font-size:14px;font-weight:600}
.nav-lbl .wn{font-size:11px;color:var(--tx3);margin-top:2px}
.month-grid-wrap{overflow-x:auto;padding:0 22px 22px}
.mgrid{display:grid;min-width:700px;border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden}
.mgrid-header{display:grid;grid-template-columns:110px 70px repeat(31,1fr);background:var(--s2);border-bottom:0.5px solid var(--bd)}
.mg-hcell{padding:6px 3px;text-align:center;font-size:11px;font-weight:500;color:var(--tx3);border-right:0.5px solid var(--bd)}
.mg-hcell.today{background:var(--teal-bg);color:var(--teal-tx)}
.mg-hcell.holiday{background:#fdf2f8;color:#be185d}
.mgrid-row{display:grid;grid-template-columns:110px 70px repeat(31,1fr);border-bottom:0.5px solid var(--bd)}
.mg-cell{padding:5px 2px;text-align:center;border-right:0.5px solid var(--bd);display:flex;align-items:center;justify-content:center}
.emp-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75px}
.shift-pill{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:5px;font-size:11px;font-weight:700;border:0.5px solid transparent;cursor:pointer}
.sp-日{background:#fff8e8;color:#92610a;border-color:#fcd34d}
.sp-小{background:#edfafa;color:#0a6e6b;border-color:#90ddd9}
.sp-大{background:#f0eeff;color:#4438a0;border-color:#c4bbff}
.sp-休{background:#edfbf4;color:#1a6040;border-color:#90e0b0}
.sp-empty{background:transparent;color:#ccc;border:0.5px dashed #ddd}

/* 修改重點：休假模式視覺 */
.leave-mode-btn.active{background:#fee2e2!important;color:#b91c1c!important;border-color:#fca5a5!important}
.leave-cell{position:relative;background:rgba(220,38,38,0.12)!important;border:1px solid rgba(220,38,38,0.3)!important;cursor:pointer}
.leave-disabled{background:transparent!important;color:rgba(150,150,150,0.5)!important;pointer-events:none}

/* Modal & Toast */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:300}
.modal{background:var(--surface);padding:22px;border-radius:var(--rl);width:300px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;padding:10px 22px;border-radius:var(--r);z-index:400;opacity:0;transition:0.3s}
.toast.show{opacity:1}

.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-ok{background:#10b981}
.sync-off{background:#f59e0b}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <div class="hdr-l"><div class="logo">🏥</div><div><div class="app-title">花醫班表系統</div><div class="app-sub"><span class="sync-dot sync-off" id="sync-dot"></span><span id="sync-label">本機模式</span></div></div></div>
      <div class="hdr-r">
        <button class="btn btn-amber" onclick="switchTab('excel')">📊 匯入班表</button>
        <button class="btn btn-teal" id="auth-btn" onclick="handleAuthBtn()">登入</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab on" id="tab-month" onclick="switchTab('month')">月視圖</div>
      <div class="tab" id="tab-log" onclick="switchTab('log')">📋 更動紀錄</div>
      <div class="tab" id="tab-excel" onclick="switchTab('excel')">匯入 Excel</div>
    </div>

    <div id="pane-month">
      <div class="nav">
        <div class="nav-c">
          <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
          <div class="nav-lbl"><div class="wr" id="month-label">載入中...</div></div>
          <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <button class="btn leave-mode-btn" id="leave-mode-btn" onclick="toggleLeaveMode()">🏖 休假模式</button>
      </div>
      <div class="month-grid-wrap" id="month-grid-wrap"></div>
    </div>

    <div id="pane-log" style="display:none;padding:22px">
      <h3>班別更動紀錄</h3>
      <div id="log-list" style="margin-top:15px"></div>
    </div>

    <div id="pane-excel" style="display:none;padding:22px">
      <h3>匯入 Excel</h3>
      <input type="file" id="excel-file" accept=".xlsx,.xls" onchange="importExcel(this)"/>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let employees = [];
let currentMonth = new Date();
let leaveMode = false;
let db = null;
let currentUser = null;

// 初始化 Firebase (請填入您的設定)
const firebaseConfig = { /* 您的 Firebase 設定 */ };
if(firebaseConfig.apiKey) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.getElementById('pane-month').style.display = tab==='month' ? 'block' : 'none';
  document.getElementById('pane-log').style.display = tab==='log' ? 'block' : 'none';
  document.getElementById('pane-excel').style.display = tab==='excel' ? 'block' : 'none';
  if(tab==='log') renderLogs();
}

function renderMonth() {
  const wrap = document.getElementById('month-grid-wrap');
  const label = document.getElementById('month-label');
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth() + 1;
  label.innerText = `${year}年 ${month}月`;
  
  const daysInMonth = new Date(year, month, 0).getDate();
  let html = `<div class="mgrid"><div class="mgrid-header"><div class="mg-hcell">姓名</div><div class="mg-hcell">類型</div>`;
  for(let i=1; i<=daysInMonth; i++) html += `<div class="mg-hcell">${i}</div>`;
  html += `</div>`;

  employees.forEach(emp => {
    // 修改重點：判斷是否為「可以填假的人」
    const isMyTurn = currentUser && emp.name === currentUser.displayName;
    const rowClass = leaveMode ? (isMyTurn ? '' : 'leave-disabled') : '';
    
    html += `<div class="mgrid-row ${rowClass}">
      <div class="mg-cell mg-emp"><span class="emp-nm">${emp.name}</span></div>
      <div class="mg-cell mg-type">檢驗</div>`;
    
    for(let d=1; d<=daysInMonth; d++){
      const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const shift = emp.schedules?.[dateKey] || '';
      const cellClass = (leaveMode && isMyTurn) ? 'leave-cell' : 'mg-cell';
      
      html += `<div class="${cellClass}" onclick="handleCellClick('${emp.id}', '${dateKey}', '${shift}')">
        <span class="shift-pill sp-${shift || 'empty'}">${shift || ''}</span>
      </div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function handleCellClick(empId, dateKey, oldShift) {
  // 班別選項
  const shifts = ['日', '小', '大', '休', ''];
  const newShift = prompt(`修改 ${dateKey} 班別 (目前: ${oldShift || '空'})`, oldShift);
  
  if (newShift !== null && newShift !== oldShift) {
    updateShift(empId, dateKey, newShift, oldShift);
  }
}

function updateShift(empId, dateKey, newShift, oldShift) {
  const emp = employees.find(e => e.id === empId);
  if(!emp.schedules) emp.schedules = {};
  emp.schedules[dateKey] = newShift;

  // 寫入更動紀錄
  const logData = {
    user: currentUser?.displayName || '匿名',
    target: emp.name,
    date: dateKey,
    from: oldShift || '空',
    to: newShift || '空',
    time: new Date().toLocaleString()
  };
  
  if(db) {
    db.ref('employees').set(employees);
    db.ref('logs').push(logData);
  }
  showToast("班表已更新並同步");
  renderMonth();
}

function importExcel(input) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});
    // 假設解析邏輯...
    // 關鍵修改：匯入後自動儲存
    if(db) db.ref('employees').set(employees);
    showToast("匯入成功且已同步雲端");
    switchTab('month');
    renderMonth();
  };
  reader.readAsArrayBuffer(file);
}

function renderLogs() {
  const list = document.getElementById('log-list');
  if(!db) { list.innerHTML = "尚未連線 Firebase"; return; }
  
  db.ref('logs').limitToLast(20).once('value', snapshot => {
    let html = '';
    snapshot.forEach(child => {
      const log = child.val();
      html += `<div style="padding:10px; border-bottom:1px solid #eee; font-size:12px">
        <b>${log.time}</b>: ${log.user} 修改了 ${log.target} 在 ${log.date} 的班別 (${log.from} → ${log.to})
      </div>`;
    });
    list.innerHTML = html || '尚無更動紀錄';
  });
}

function toggleLeaveMode() {
  leaveMode = !leaveMode;
  document.getElementById('leave-mode-btn').classList.toggle('active');
  renderMonth();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function changeMonth(step) {
  currentMonth.setMonth(currentMonth.getMonth() + step);
  renderMonth();
}

window.onload = () => {
  if(db) {
    db.ref('employees').on('value', snap => {
      employees = snap.val() || [];
      renderMonth();
      document.getElementById('sync-dot').className = 'sync-dot sync-ok';
      document.getElementById('sync-label').innerText = '雲端同步中';
    });
  } else {
    renderMonth();
  }
};
</script>
</body>
</html>
